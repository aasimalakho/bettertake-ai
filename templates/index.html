<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BetterTake AI</title>
  <meta name="description" content="Two AI agents argue over your ad until it's good enough to ship." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖊️</text></svg>" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Backblaze Generative Media Hackathon — Working Proof</p>
    <h1 class="brand-mark">BetterTake<span class="accent">AI</span></h1>
    <p class="tagline">Two AI agents argue over your ad — until it's marked up and approved.</p>
    <nav class="topnav"><a href="/history">Past campaigns →</a></nav>
  </header>

  <div class="page">
    <main>
      <form id="brief-form">
        <div class="slip-title"><span>Submission Slip</span><span>New Brief</span></div>

        <div class="row2">
          <label>
            <span class="field-label">Product / Campaign</span>
            <textarea name="product" rows="2" maxlength="600" placeholder="e.g. A minimalist ceramic pour-over coffee maker, launching for World Coffee Day" required></textarea>
          </label>

          <label>
            <span class="field-label">Brand Direction</span>
            <textarea name="brand_direction" rows="2" maxlength="600" placeholder="e.g. Calm, premium, morning-ritual mood. Warm neutral tones, no clutter." required></textarea>
          </label>
        </div>

        <div class="row2">
          <label>
            <span class="field-label">Reference Image <span class="optional">(optional)</span></span>
            <div class="file-drop">
              <span id="file-drop-label">No file attached — tap to browse</span>
              <span class="file-drop-name" id="file-drop-name"></span>
              <input type="file" name="reference_image" id="reference_image" accept="image/*" />
            </div>
          </label>

          <label>
            <span class="field-label">Rounds of Review</span>
            <select name="max_rounds">
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
            </select>
          </label>
        </div>

        <button type="submit" id="submit-btn">Submit for Review →</button>
      </form>

      <div id="status" class="status hidden"></div>

      <section id="results" class="hidden">
        <p class="section-label">The Proof Sheet</p>
        <h2>Marked up, round by round.</h2>
        <div id="rounds"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
